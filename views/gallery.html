<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - FuelCheck Thailand</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="bg-emerald-600 p-1.5 rounded-lg shrink-0">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                    </svg>
                </div>
                <span class="text-lg sm:text-xl font-bold tracking-tight truncate">Secret <span class="text-emerald-600">Gallery</span></span>
            </div>
            <div class="flex gap-4 text-xs sm:text-sm font-medium text-slate-600">
                <a href="/auth/logout" class="hover:text-emerald-600">Logout</a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 sm:py-12">
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-end gap-6 mb-8 sm:mb-12">
            <div>
                <h1 class="text-2xl sm:text-3xl font-bold mb-2">Image Repository</h1>
                <p class="text-slate-500 text-sm sm:text-base">Internal assets and documentation photos.</p>
            </div>
            <button onclick="document.getElementById('upload-modal').classList.remove('hidden')" class="w-full sm:w-auto bg-emerald-600 text-white font-bold px-6 py-3 rounded-xl shadow-lg shadow-emerald-200 hover:bg-emerald-700 transition-colors">
                Upload New
            </button>
        </div>

        <div id="gallery-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3 sm:gap-6">
            <!-- Images will be loaded here -->
        </div>
    </main>

    <!-- Upload Modal -->
    <div id="upload-modal" class="hidden fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-[60] flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl p-8 w-full max-w-md shadow-2xl">
            <h2 class="text-xl font-bold mb-6">Upload Images</h2>
            <form action="/gallery/upload" method="POST" enctype="multipart/form-data" class="space-y-6">
                <div class="border-2 border-dashed border-slate-200 rounded-xl p-8 text-center hover:border-emerald-500 transition-colors cursor-pointer" onclick="document.getElementById('file-input').click()">
                    <input type="file" id="file-input" name="images" class="hidden" accept="image/*" multiple onchange="updateFileCount(this)" required>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-slate-300 mx-auto mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                    </svg>
                    <p id="file-text" class="text-sm text-slate-500 font-medium">Click to select or drag and drop</p>
                    <p class="text-[10px] text-slate-400 mt-1 uppercase font-bold tracking-widest">JPG, PNG, GIF (Max 10 files, 5MB each)</p>
                </div>
                <div class="flex gap-4">
                    <button type="button" onclick="closeModal()" class="flex-1 py-3 rounded-xl border border-slate-200 text-slate-600 font-bold hover:bg-slate-50 transition-colors">Cancel</button>
                    <button type="submit" class="flex-1 py-3 rounded-xl bg-emerald-600 text-white font-bold hover:bg-emerald-700 transition-colors shadow-lg shadow-emerald-200">Upload All</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Fullscreen Modal -->
    <div id="full-modal" class="hidden fixed inset-0 bg-slate-900/95 backdrop-blur-md z-[70] flex items-center justify-center p-4" onclick="this.classList.add('hidden')">
        <img id="full-img" src="" class="max-w-full max-h-full rounded-lg shadow-2xl">
    </div>

    <script>
        function updateFileCount(input) {
            const text = document.getElementById('file-text');
            if (input.files.length > 0) {
                text.innerText = `Selected ${input.files.length} file(s)`;
                text.classList.add('text-emerald-600');
            } else {
                text.innerText = 'Click to select or drag and drop';
                text.classList.remove('text-emerald-600');
            }
        }

        function closeModal() {
            document.getElementById('upload-modal').classList.add('hidden');
            document.getElementById('file-input').value = '';
            document.getElementById('file-text').innerText = 'Click to select or drag and drop';
            document.getElementById('file-text').classList.remove('text-emerald-600');
        }

        function loadImages() {
            fetch('/gallery/api/images')
                .then(res => res.json())
                .then(data => {
                    const grid = document.getElementById('gallery-grid');
                    grid.innerHTML = '';
                    data.forEach(img => {
                        const card = `
                            <div class="group relative bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden aspect-square">
                                <img src="/uploads/${img.filename}" class="w-full h-full object-cover cursor-pointer" onclick="showFull('/uploads/${img.filename}')">
                                <div class="absolute inset-0 bg-slate-900/60 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center gap-4">
                                    <button onclick="deleteImg('${img.filename}')" class="p-2 bg-rose-500 text-white rounded-lg hover:bg-rose-600 transition-colors">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                        </svg>
                                    </button>
                                </div>
                            </div>
                        `;
                        grid.innerHTML += card;
                    });
                });
        }

        function showFull(src) {
            event.stopPropagation();
            document.getElementById('full-img').src = src;
            document.getElementById('full-modal').classList.remove('hidden');
        }

        function deleteImg(filename) {
            event.stopPropagation();
            if (confirm('Are you sure you want to delete this image?')) {
                fetch(`/gallery/image/${filename}`, { method: 'DELETE' })
                    .then(res => res.json())
                    .then(() => loadImages());
            }
        }

        loadImages();
    </script>
</body>
</html>
