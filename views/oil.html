<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oil Prices - FuelCheck Thailand</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="bg-emerald-600 p-1.5 rounded-lg shrink-0">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                    </svg>
                </div>
                <span class="text-lg sm:text-xl font-bold tracking-tight truncate">FuelCheck <span class="text-emerald-600">TH</span></span>
            </div>
            <div class="flex gap-3 sm:gap-6 text-xs sm:text-sm font-medium text-slate-600">
                <a href="/oil" class="text-emerald-600">Prices</a>
                <a href="/login" class="hover:text-emerald-600">Login</a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 sm:py-12">
        <div class="mb-8 sm:mb-12">
            <h1 class="text-2xl sm:text-3xl font-bold mb-2">Daily Oil Prices</h1>
            <p class="text-slate-500 text-sm sm:text-base">Official fuel prices in Thailand. Updated: <span id="update-date"></span></p>
        </div>

        <div class="bg-white rounded-xl sm:rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm sm:text-base">
                    <thead>
                        <tr class="bg-slate-50 text-slate-400 text-[10px] sm:text-xs uppercase font-bold tracking-wider">
                            <th class="px-4 sm:px-6 py-3 sm:py-4">Brand</th>
                            <th class="px-4 sm:px-6 py-3 sm:py-4">Type</th>
                            <th class="px-4 sm:px-6 py-3 sm:py-4">Price</th>
                            <th class="px-4 sm:px-6 py-3 sm:py-4 hidden sm:table-cell">Status</th>
                        </tr>
                    </thead>
                    <tbody id="price-table" class="divide-y divide-slate-100">
                        <!-- Data will be loaded here -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        document.getElementById('update-date').innerText = new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });

        fetch('/oil/api/prices')
            .then(res => res.json())
            .then(data => {
                const table = document.getElementById('price-table');
                data.forEach(item => {
                    const row = `
                        <tr class="hover:bg-slate-50 transition-colors">
                            <td class="px-4 sm:px-6 py-3 sm:py-4 font-bold text-slate-700">${item.brand}</td>
                            <td class="px-4 sm:px-6 py-3 sm:py-4 text-slate-600">${item.fuel_type}</td>
                            <td class="px-4 sm:px-6 py-3 sm:py-4 font-mono font-bold text-emerald-600">${item.price.toFixed(2)}</td>
                            <td class="px-4 sm:px-6 py-3 sm:py-4 hidden sm:table-cell">
                                <span class="px-2 py-1 bg-emerald-50 text-emerald-600 text-[10px] font-bold rounded-full uppercase">Stable</span>
                            </td>
                        </tr>
                    `;
                    table.innerHTML += row;
                });
            });
    </script>
</body>
</html>
